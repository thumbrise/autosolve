name: CI

on:
  pull_request:
    branches:
      - main

permissions:
  contents: read
  pull-requests: read

env:
  GO_VERSION: 1.26.x
  GOLANGCI_LINT_VERSION: v2.11.4
  TASK_VERSION: 3.44.0
  NODE_VERSION: lts/*

jobs:
  lint:
    name: Lint source code
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Go mod download
        run: go mod download

      - name: Install golangci-lint
        run: curl -sSfL https://golangci-lint.run/install.sh | sh -s -- -b $(go env GOPATH)/bin ${{ env.GOLANGCI_LINT_VERSION }}

      - name: Install sqlfluff
        run: pip install sqlfluff

      - name: Install Task
        uses: go-task/setup-task@v2
        with:
          version: ${{ env.TASK_VERSION }}

      - name: Run lint
        run: task lint:ci

  verify-generate:
    name: Verify generated code
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Go mod download
        run: go mod download

      - name: Install Task
        uses: go-task/setup-task@v2
        with:
          version: ${{ env.TASK_VERSION }}

      - name: Run generate
        run: task generate

      - name: Check for diff
        run: |
          if ! git diff --exit-code || [ -n "$(git status --porcelain)" ]; then
            echo "::error::Generated code is out of date. Run 'task generate' and commit."
            exit 1
          fi

  test:
    name: Test source code
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Go ${{ env.GO_VERSION }}
        uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Install Task
        uses: go-task/setup-task@v2
        with:
          version: ${{ env.TASK_VERSION }}

      - name: Test
        run: task test

  commitlint:
    name: Lint commit message
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup node
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Print versions
        run: |
          git --version
          node --version
          npm --version
          npx commitlint --version

      - name: Validate PR commits with commitlint
        run: npx commitlint --from ${{ github.event.pull_request.base.sha }} --to ${{ github.event.pull_request.head.sha }} --verbose

  docs-build:
    name: Validate docs build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: docs/package-lock.json

      - name: Install dependencies
        working-directory: docs
        run: npm ci

      - name: Build
        working-directory: docs
        run: npm run build
