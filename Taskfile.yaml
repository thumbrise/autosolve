#schema: https://taskfile.dev/schema.json
version: '3.17'

tasks:
  up:
    desc: run scheduler
    cmd: go run . schedule

  infra:
    desc: docker compose arguments. Example [task c -- up -d]. -- required
    cmd: docker compose {{.CLI_ARGS}}

  up:infra:
    desc: Up infra
    cmds:
      - task down:infra

      - task infra -- up -d --build --remove-orphans

      - docker image prune --force
      - docker container prune --force

  down:infra:
    desc: Down infra
    cmds:
      - task infra -- down

  lint:
    desc: Run lint with auto-fix where possible (dev workflow)
    cmds:
      - golangci-lint run --fix
      - go tool license-eye header fix
      - task: lint:sql

  lint:sql:
    desc: Lint and fix SQL files
    cmds:
      # temporary
      - task: lint:sql:ci
      # (TODO: sql fmt (#138))

  lint:sql:ci:
    desc: Lint SQL files without fix (CI)
    cmds:
      - if which sqlfluff > /dev/null 2>&1; then sqlfluff lint; else echo "sqlfluff not found, skipping SQL lint (pipx install sqlfluff)"; fi
      - task: lint:sql:types

  lint:sql:types:
    desc: Check sqlcgen for interface{} fields
    internal: true
    cmd: |
      MATCHES=$(grep -rn 'interface{}' internal/infrastructure/dal/sqlcgen/ --exclude=db.go || true)  
      if [ -n "$MATCHES" ]; then  
        echo "ERROR: sqlc generated interface{} fields — check column types in migrations:"  
        echo "$MATCHES"  
        exit 1  
      else  
        echo "sqlcgen types OK"  
      fi

  lint:ci:
    desc: Run lint checks without auto-fix (CI workflow)
    cmds:
      - golangci-lint run
      - go tool license-eye dependency check
      - go tool license-eye header check
      - go tool govulncheck ./...
      - task: lint:sql:ci

  test:
    desc: Run tests
    cmds:
      - go test ./... -v -tags=test
      - go test ./... -v -tags=test -run=NONE -bench=. -benchmem

  migrate:create:
    desc: Create a new SQL migration
    cmds:
      - go run . migrate create {{.CLI_ARGS}}

  generate:
    desc: Generate all needed
    aliases:
      - gen
    cmds:
      - go tool sqlc generate
      - go tool wire $(go list ./... | grep -v /test)
      - go tool license-eye header fix