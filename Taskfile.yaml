#schema: https://taskfile.dev/schema.json
version: '3.17'

tasks:
  up:
    desc: Run scheduler
    cmds:
      - go run . schedule

  lint:
    desc: Run lint
    cmds:
      - golangci-lint run
      - go tool license-eye dependency check
      - go tool license-eye header check
      - task: lint:sql

  lint:sql:
    desc: Lint SQL migrations
    cmds:
      - which sqlfluff > /dev/null 2>&1 && sqlfluff lint internal/infrastructure/database/migrations/ --dialect sqlite || echo "sqlfluff not found, skipping SQL lint (pip install sqlfluff)"

  test:
    desc: Run tests
    cmds:
      - go test ./... -v -tags=test
      - go test ./... -v -tags=test -run=NONE -bench=. -benchmem

  license:
    desc: Add license headers to files
    cmds:
      - go tool license-eye header fix

  migrate:create:
    desc: Create a new SQL migration
    cmds:
      - go run . migrate create {{.CLI_ARGS}}

  generate:
    desc: Generate all needed
    aliases:
      - gen
    cmds:
      - go tool sqlc generate
      - go tool wire $(go list ./... | grep -v /test)